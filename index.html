<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Max Mustermann – Webentwickler</title>
  <meta name="description" content="Portfolio, Projekte, Video und Kontakt von Max Mustermann – Webentwickler für performante, klare Websites.">
  <!-- Falls deine Seite bereits styles.css nutzt, bleibt das bestehen: -->
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* Zusätzliche, sichere Styles nur für das Video – kollidiert nicht mit bestehendem CSS */
    .video-section .video-embed { position: relative; width: 100%; max-width: 900px; margin: 0 auto; aspect-ratio: 16 / 9; border-radius: 16px; overflow: hidden; border: 1px solid var(--border, #e6e8f0); box-shadow: 0 10px 24px rgba(0,0,0,.08); }
    .video-section .video-embed iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; display: block; }
    @supports not (aspect-ratio: 16 / 9) { .video-section .video-embed { height: 0; padding-bottom: 56.25%; } }
    .muted { color: var(--muted, #5d667a); }
    .container { max-width: 1100px; margin: 0 auto; padding: 0 1.25rem; }
    .section { padding: 2rem 0; }
    h2 { font-size: 1.6rem; margin: 0 0 1rem; }
  </style>
</head>
<body>
  <main>
    <!-- Dein bestehender Inhalt bleibt unverändert. Dieses neue Video-Segment kannst du frei platzieren. -->
    <section class="section video-section" id="video" aria-labelledby="video-heading">
      <div class="container">
        <h2 id="video-heading">Video</h2>
        <div class="video-embed">
          <iframe
            src="https://app.colossyan.com/embed/afff6164-0ff7-4733-bd27-2002c1e0511f"
            title="Colossyan Video"
            loading="lazy"
            width="560"
            height="315"
            frameborder="0"
            allow="autoplay; fullscreen; picture-in-picture"
            referrerpolicy="strict-origin-when-cross-origin"
            allowfullscreen
          ></iframe>
        </div>
        <p class="muted">Hinweis: Das Video wird extern von Colossyan geladen.</p>
      </div>
    </section>
  </main>
</body>
</html>
