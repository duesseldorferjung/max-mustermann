  <!-- Falls vorhanden, bleibt dein Favicon & Stylesheet-Pfad identisch -->
  <link rel="icon" href="assets/favicon.png">
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* Zusatz-Styles nur für die Video-Einbettung – konfliktarm */
    .video-embed {
      position: relative;
      width: 100%;
      max-width: 900px;      /* bei Bedarf anpassen */
      margin: 0 auto;        /* zentrieren */
      aspect-ratio: 16 / 9;  /* moderne Browser */
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--border, #e6e8f0);
      box-shadow: 0 10px 24px var(--shadow, rgba(0,0,0,.08));
    }
    .video-embed iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }
    /* Fallback für sehr alte Browser ohne aspect-ratio */
    @supports not (aspect-ratio: 16 / 9) {
      .video-embed { height: 0; padding-bottom: 56.25%; }
      .video-embed iframe { position: absolute; width: 100%; height: 100%; }
    }
  </style>
</head>
